spring.application.name=portfolio-alerts

# ===========================
# MySQL Database
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/dev
spring.datasource.username=root
spring.datasource.password=Cheenu@135
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# Kafka Configuration
# ===========================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=portfolio-alerts-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ===========================
# Alpha Vantage API Key
# ===========================
stock.api.key=7IPN5PLGTCHSDM9R

# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===========================
# Logging
# ===========================
logging.level.com.ch=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/portfolio-alerts.log